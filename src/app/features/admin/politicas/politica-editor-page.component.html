<div class="flex flex-col h-[calc(100vh-110px)] min-h-[500px] space-y-4">
  <!-- Cabecera Compacta -->
  <div class="flex items-center justify-between flex-wrap gap-2 flex-shrink-0">
    <h1 class="text-2xl font-bold text-text-primary">
      {{ editingId() ? 'Editar política' : 'Nueva política' }}
    </h1>
    <div class="flex items-center gap-2">
      <button
        type="button"
        (click)="onCancel()"
        class="px-4 py-2 rounded-button border border-border bg-surface hover:bg-background text-text-secondary text-sm font-medium transition-colors"
      >
        Cancelar
      </button>
      <button
        type="button"
        (click)="openSaveModal()"
        [disabled]="loading() || saving()"
        class="px-4 py-2 rounded-button bg-primary-500 text-white hover:bg-primary-600 disabled:opacity-50 disabled:cursor-not-allowed text-sm font-medium transition-colors flex items-center gap-2"
      >
        @if (saving()) { <zf-loading-spinner size="sm" /> }
        Guardar política
      </button>
    </div>
  </div>

  @if (error(); as msg) {
    <div class="p-3 rounded-input border border-danger text-sm text-danger bg-danger/10 flex-shrink-0" role="alert">
      {{ msg }}
    </div>
  }

  @if (loading()) {
    <div class="flex-grow flex items-center justify-center">
      <zf-loading-spinner size="lg" />
    </div>
  } @else {
    <!-- Contenedor del Editor BPMN con alto flexible -->
    <div class="flex-1 min-h-0">
      <zf-bpmn-editor #editor class="h-full" [xml]="initial()?.diagramaBpmn ?? null" [actividades]="initial()?.actividades ?? []" />
    </div>
  }

  <!-- Modal de Guardado (Efecto Glassmorphism y centrado) -->
  @if (showSaveModal()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div class="bg-surface border border-border p-6 rounded-card shadow-lg max-w-lg w-full space-y-4 mx-4">
        <div class="flex items-center justify-between">
          <h3 class="text-lg font-bold text-text-primary">Datos de la política</h3>
          <button type="button" (click)="closeSaveModal()" class="text-text-secondary hover:text-text-primary text-xl font-bold line-none">&times;</button>
        </div>
        
        <form [formGroup]="form" (ngSubmit)="onConfirmSave()" novalidate class="space-y-4">
          <div>
            <label for="nombre" class="block text-xs font-semibold text-text-secondary mb-1">Nombre *</label>
            <input
              id="nombre"
              type="text"
              formControlName="nombre"
              placeholder="Ej: Aprobación de presupuestos"
              class="w-full px-3 py-2 rounded-input border border-border bg-background text-text-primary text-sm focus:outline-none focus:ring-1 focus:ring-primary-500"
              [class.border-danger]="form.controls.nombre.touched && form.controls.nombre.invalid"
            />
            @if (form.controls.nombre.touched && form.controls.nombre.invalid) {
              <p class="text-xs text-danger mt-1">Mínimo 3 caracteres.</p>
            }
          </div>
          
          <div>
            <label for="descripcion" class="block text-xs font-semibold text-text-secondary mb-1">Descripción</label>
            <textarea
              id="descripcion"
              formControlName="descripcion"
              rows="3"
              placeholder="Describí brevemente para qué sirve esta política..."
              class="w-full px-3 py-2 rounded-input border border-border bg-background text-text-primary text-sm focus:outline-none focus:ring-1 focus:ring-primary-500 resize-none"
            ></textarea>
          </div>

          <div class="flex justify-end gap-2 pt-2">
            <button
              type="button"
              (click)="closeSaveModal()"
              class="px-4 py-2 text-sm rounded-button border border-border bg-surface hover:bg-background text-text-secondary"
            >
              Volver al editor
            </button>
            <button
              type="submit"
              [disabled]="saving() || form.invalid"
              class="px-4 py-2 text-sm rounded-button bg-primary-500 text-white hover:bg-primary-600 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 font-medium"
            >
              @if (saving()) { <zf-loading-spinner size="sm" /> }
              Confirmar y Guardar
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
