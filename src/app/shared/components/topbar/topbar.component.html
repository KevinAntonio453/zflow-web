<header class="h-16 bg-surface border-b border-border flex items-center justify-between px-4 gap-4 sticky top-0 z-20">
  <div class="flex items-center gap-2">
    <!-- Mobile burger -->
    <button
      type="button"
      (click)="toggleSidebar.emit()"
      aria-label="Abrir menú lateral"
      class="md:hidden p-2 rounded-button hover:bg-primary-50 dark:hover:bg-primary-900/40"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

    <!-- Desktop collapse -->
    <button
      type="button"
      (click)="toggleCollapse.emit()"
      [attr.aria-label]="collapsed() ? 'Expandir menú lateral' : 'Plegar menú lateral'"
      class="hidden md:inline-flex p-2 rounded-button hover:bg-primary-50 dark:hover:bg-primary-900/40"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h10M4 18h16" />
      </svg>
    </button>
  </div>

  <div class="flex items-center gap-2">
    <zf-notification-bell />
    <zf-theme-toggle />

    @if (user(); as u) {
      <div class="flex items-center gap-3 pl-2 border-l border-border">
        <zf-avatar [nombre]="u.nombre" size="sm" />
        <div class="hidden sm:flex flex-col leading-tight">
          <span class="text-sm font-medium text-text-primary">{{ u.nombre }}</span>
          <span class="text-xs text-text-secondary">{{ rol() }}</span>
        </div>
        <button
          type="button"
          (click)="onLogout()"
          class="ml-2 text-sm text-primary-600 hover:text-primary-700 dark:text-primary-300 dark:hover:text-primary-200"
        >
          Salir
        </button>
      </div>
    }
  </div>
</header>
