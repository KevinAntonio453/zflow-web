<!-- Brand -->
<div class="h-16 flex items-center px-4 border-b border-border">
  <a routerLink="/admin/dashboard" class="flex items-center gap-2 font-bold text-primary-600" (click)="closeMobile()">
    @if (logoUrl()) {
      <img [src]="logoUrl()" alt="Logo" class="w-8 h-8 object-contain rounded" />
    } @else {
      <span class="w-8 h-8 rounded-button bg-primary-500 text-white flex items-center justify-center text-sm">ZF</span>
    }
    @if (!collapsed()) {
      <span class="text-lg text-text-primary">{{ orgName() }}</span>
    }
  </a>
</div>

<!-- Nav items -->
<nav class="flex-1 overflow-y-auto py-4 px-2">
  <ul class="space-y-1">
    @for (item of items(); track item.route) {
      <li>
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-primary-50 text-primary-600 dark:bg-primary-900/40 dark:text-primary-300"
          [routerLinkActiveOptions]="{ exact: false }"
          (click)="closeMobile()"
          class="flex items-center gap-3 px-3 py-2 rounded-button text-text-primary hover:bg-primary-50 dark:hover:bg-primary-900/40 transition-colors text-sm"
          [attr.title]="collapsed() ? item.label : null"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.iconPath" />
          </svg>
          @if (!collapsed()) {
            <span>{{ item.label }}</span>
          }
        </a>
      </li>
    }
  </ul>
</nav>
